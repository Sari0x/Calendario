<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendario de Reuniones</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23007aff'/%3E%3Cpath d='M18 16h28v30H18z' fill='white'/%3E%3Cpath d='M18 24h28' stroke='%23007aff' stroke-width='4'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar glass">
      <div class="brand-wrap">
        <img src="img/Novo%20Hub%20Logo.png" alt="Novo Hub" class="brand-logo" />
        <div>
          <h1>Panel de Calendario</h1>
          <p class="sub">Gestión visual de reuniones</p>
        </div>
      </div>

      <div class="menu-actions">
        <button id="openMeetingForm" class="btn btn-pill btn-primary"><i class="bi bi-plus-circle"></i> Nuevo evento</button>
        <button id="openProvidersModal" class="btn btn-pill btn-soft"><i class="bi bi-building-add"></i> Proveedor</button>
        <button id="openParticipantsModal" class="btn btn-pill btn-soft"><i class="bi bi-person-plus"></i> Participante</button>
      </div>
    </header>

    <main class="container">
      <div id="appNotice" class="notice hidden"></div>

      <section id="meetingFormSection" class="card glass collapsed">
        <div class="card-header">
          <h2><i class="bi bi-calendar2-plus"></i> Nueva reunión</h2>
          <div class="header-actions">
            <button id="cancelEdit" class="btn btn-pill btn-ghost hidden"><i class="bi bi-x-circle"></i> Cancelar edición</button>
            <button id="saveMeeting" class="btn btn-pill btn-primary"><i class="bi bi-floppy"></i> Cargar evento</button>
          </div>
        </div>

        <div class="grid-form">
          <label><i class="bi bi-calendar-event"></i> Día<input id="meetingDate" type="text" placeholder="Seleccionar fecha" /></label>
          <label><i class="bi bi-clock"></i> Hora de inicio<input id="meetingTime" type="time" /></label>
          <label><i class="bi bi-hourglass-split"></i> Duración (min)<input id="meetingDuration" type="number" min="15" step="15" value="60" /></label>
          <label><i class="bi bi-collection"></i> Proveedores participantes<div id="providersPicker" class="multi-picker"></div></label>
          <label><i class="bi bi-people"></i> Participantes<div id="participantsPicker" class="multi-picker"></div></label>
          <label class="full-col"><i class="bi bi-journal-text"></i> Nota<textarea id="meetingNote" rows="3" placeholder="Agregar nota"></textarea></label>
          <label class="full-col"><i class="bi bi-link-45deg"></i> Link (opcional)<input id="meetingLink" type="url" placeholder="https://..." /></label>
        </div>
      </section>

      <section class="card glass">
        <div class="card-header wrap">
          <h2><i class="bi bi-kanban"></i> Reuniones</h2>
          <div class="filter">
            <input id="filterDate" type="text" placeholder="Filtrar por fecha" />
            <button id="clearFilter" class="btn btn-pill btn-ghost"><i class="bi bi-eraser"></i> Limpiar</button>
          </div>
        </div>

        <div class="quick-filters" id="quickFilters">
          <button class="quick-filter active" data-filter="all"><i class="bi bi-grid"></i> Todas</button>
          <button class="quick-filter" data-filter="in_progress"><i class="bi bi-play-circle"></i> En curso</button>
          <button class="quick-filter" data-filter="today"><i class="bi bi-sun"></i> Hoy</button>
          <button class="quick-filter" data-filter="week"><i class="bi bi-calendar-week"></i> Esta semana</button>
          <button class="quick-filter" data-filter="next_week"><i class="bi bi-calendar2-week"></i> Próxima semana</button>
          <button class="quick-filter" data-filter="finished"><i class="bi bi-check2-circle"></i> Finalizadas</button>
        </div>

        <div id="spinner" class="spinner-wrap hidden"><div class="spinner"></div></div>
        <div id="meetingsList" class="meetings-list"></div>

        <div class="pagination">
          <button id="prevPage" class="btn btn-pill btn-ghost">Anterior</button>
          <span id="pageInfo">Página 1</span>
          <button id="nextPage" class="btn btn-pill btn-ghost">Siguiente</button>
        </div>
      </section>
    </main>

    <footer class="footer glass">
      <div class="footer-brand">
        <img src="img/Novo%20Hub%20Logo.png" alt="Novo Hub" class="brand-logo" />
        <div>
          <strong>Novo Hub Calendario</strong>
          <p>Planificación profesional de reuniones.</p>
        </div>
      </div>
      <div class="footer-meta">
        <span><i class="bi bi-shield-check"></i> Experiencia iOS-like</span>
        <span><i class="bi bi-lightning-charge"></i> Agenda optimizada</span>
      </div>
    </footer>

    <dialog id="providersModal" class="modal">
      <form id="providersForm" class="modal-content">
        <h3>Nuevo proveedor</h3>
        <label>Nombre <input id="providerName" type="text" required /></label>
        <label>Imagen (URL) <input id="providerImage" type="url" required /></label>
        <div class="modal-list-wrap">
          <strong>Proveedores creados</strong>
          <div id="providersCreatedList" class="created-list"></div>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelProvider" class="btn btn-pill btn-ghost">Cancelar</button>
          <button type="submit" id="saveProvider" class="btn btn-pill btn-primary">Guardar</button>
        </div>
      </form>
    </dialog>

    <dialog id="participantsModal" class="modal">
      <form id="participantsForm" class="modal-content">
        <h3>Nuevo participante</h3>
        <label>Nombre <input id="participantName" type="text" required /></label>
        <label>Apellido <input id="participantLastName" type="text" required /></label>
        <label>Email <input id="participantEmail" type="email" required /></label>
        <div class="modal-list-wrap">
          <strong>Participantes creados</strong>
          <div id="participantsCreatedList" class="created-list"></div>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancelParticipant" class="btn btn-pill btn-ghost">Cancelar</button>
          <button type="submit" id="saveParticipant" class="btn btn-pill btn-primary">Guardar</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
